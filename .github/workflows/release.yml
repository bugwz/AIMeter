name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set tag name
        id: tag
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create source archive
        run: |
          TAG=${{ steps.tag.outputs.TAG }}
          # Exclude files not needed in release package
          git archive --format=zip --prefix=aimeter-${TAG}/ HEAD \
            --worktree-attributes \
            -o aimeter-${TAG}.zip
          git archive --format=tar.gz --prefix=aimeter-${TAG}/ HEAD \
            --worktree-attributes \
            -o aimeter-${TAG}.tar.gz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.TAG }}
          name: ${{ steps.tag.outputs.TAG }}
          generate_release_notes: true
          files: |
            aimeter-${{ steps.tag.outputs.TAG }}.zip
            aimeter-${{ steps.tag.outputs.TAG }}.tar.gz
