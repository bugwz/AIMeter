# AIMeter main configuration file example
# Priority: this file > environment variables > built-in defaults
# NOTE: Database configuration is mandatory. engine + connection must be set.

server:
  apiUrl: /api
  frontendPort: 3000
  backendPort: 3001
  # http or https
  protocol: http

runtime:
  # true: fetch mock data; false: fetch live data
  mockEnabled: false
  # node or serverless
  mode: node

database:
  # Required. One of: sqlite, d1, mysql, postgres
  engine: sqlite
  # Required. Examples:
  # sqlite: ./data/aimeter.db
  # d1: DB
  # mysql: mysql://root:password@127.0.0.1:3306/aimeter
  # postgres: postgresql://postgres:password@127.0.0.1:5432/aimeter
  connection: ./data/aimeter.db

auth:
  # Session cookie lifetime in seconds
  sessionTtlSeconds: 43200

  # Optional integration secrets (32 random chars when set)
  # In database mode these are only used during first initialization,
  # then managed in DB.
  # cronSecret: replace-with-32-char-random-secret
  # endpointSecret: replace-with-32-char-random-secret

  rateLimit:
    windowMs: 60000
    maxAttempts: 5
    blockMs: 300000
